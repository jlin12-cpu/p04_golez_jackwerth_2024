[config]
type = "pipeline"
chartbook_format_version = "0.0.2"

[site]
title = "Holding Period Effects in Dividend Strip Returns"
author = "Jie Lin and Zimeng Yi"
copyright = "2025"
logo_path = ""
favicon_path = ""

[pipeline]
id = "P04"
pipeline_name = "Holding Period Effects in Dividend Strip Returns"
pipeline_description = "Homework 3 for FINM 32900"
lead_pipeline_developer = "Jie Lin and Zimeng Yi"
contributors = ["Jie Lin and Zimeng Yi"]
software_modules_command = "module load anaconda3/3.11.4 TeXLive/2023"
runs_on_grid_or_windows_or_other = "Windows/Linux/MacOS"
git_repo_URL = ""
README_file_path = "./README.md"

[notebooks]
[notebooks.data_analysis]
notebook_name = "Data Analysis"
notebook_description = "Initial exploration of all data sources: CRSP S&P 500, Treasury rates and returns, and SPX options. Creates visualizations to verify data quality and coverage."
notebook_path = "src/SPX_index_options_graph_revised.ipynb"


[dataframes]

[dataframes.crsp_sp500]
name = "CRSP S&P 500 Daily Returns"
path_to_parquet_data = "_data/crsp_sp500_daily.parquet"
date_col = "date" 
short_description = "Daily S&P 500 index returns from CRSP (1996-2024)"
dataframe_docs_str = "Daily S&P 500 value-weighted return index data from CRSP. Includes returns with and without dividends (vwretd and vwretx) used to calculate realized dividends."
data_sources = ["CRSP"]
data_providers = ["WRDS"]
how_is_pulled = "Downloaded via WRDS API using wrds-python library. Query pulls daily returns from crsp.dsi table including vwretd (with dividends) and vwretx (ex-dividends)."

[dataframes.fred_treasury_rates]
name = "Treasury Rates (Daily)"
path_to_parquet_data = "_data/fred_treasury_rates.parquet"
date_col = "date" 
short_description = "Daily treasury rates: 1-month T-bill from Fama-French, 2-year and 10-year from FRED"
dataframe_docs_str = "Daily Treasury rates from multiple sources. 1-month T-bill rate from Fama-French data library (annualized from daily rate), 2-year and 10-year constant maturity rates from FRED."
data_sources = ["Fama-French Data Library", "FRED"]
data_providers = ["Kenneth French", "Federal Reserve"]
how_is_pulled = "1-month T-bill pulled from Fama-French daily factors. 2-year and 10-year Treasury rates pulled from FRED using pandas_datareader. RF rate annualized by multiplying daily rate by 252."

[dataframes.crsp_treasury_returns]
name = "CRSP Treasury Bond Returns (Monthly)"
path_to_parquet_data = "_data/crsp_treasury_returns.parquet"
date_col = "date" 
short_description = "Monthly returns on 2-year and 10-year Treasury bonds from CRSP"
dataframe_docs_str = "Monthly total returns on 2-year and 10-year constant maturity Treasury bonds from CRSP. Returns include both price changes and coupon income."
data_sources = ["CRSP"]
data_providers = ["WRDS"]
how_is_pulled = "Downloaded via WRDS API from crsp.mcti table (Monthly Constant Maturity Treasury Index). Returns are total returns including price changes and coupon income."

[dataframes.optionmetrics_spx]
name = "SPX Options (Month-End)"
path_to_parquet_data = "_data/optionmetrics_spx_monthly.parquet"
date_col = "date" 
short_description = "European SPX options data from OptionMetrics, filtered to month-end observations (1996-2025)"
dataframe_docs_str = "European S&P 500 index options from OptionMetrics IvyDB. Data filtered to last business day of each month, with maturity >= 90 days and bid-ask midpoint >= $3. Includes calls, puts, strikes, implied volatility, and Greeks."
data_sources = ["OptionMetrics IvyDB"]
data_providers = ["WRDS"]
how_is_pulled = "Downloaded year-by-year from OptionMetrics via WRDS. Filtered for: (1) SPX European options (secid=108105), (2) last business day of each month, (3) maturity >= 90 days, (4) bid-ask midpoint >= $3. Includes call and put options with strikes, implied volatility, and Greeks."

[dataframes.fama_french_factors]
name = "Fama-French Factors (Daily)"
path_to_parquet_data = "_data/fama_french_factors.parquet"
date_col = "date" 
short_description = "Daily Fama-French 3 factors (Mkt-RF, SMB, HML) plus risk-free rate"
dataframe_docs_str = "Daily Fama-French three-factor model data including market factor (Mkt-RF), size factor (SMB), value factor (HML), and risk-free rate. All factors in decimal form."
data_sources = ["Fama-French Data Library"]
data_providers = ["Kenneth French"]
how_is_pulled = "Downloaded via pandas_datareader from Kenneth French Data Library. Contains daily market factor (Mkt-RF), size factor (SMB), value factor (HML), and risk-free rate."

[charts]

[charts.sp500_cumulative]
chart_name = "S&P 500 Cumulative Returns"
short_description_chart = "Growth of $1 invested in S&P 500 from 1996-2024. Shows long-term wealth accumulation with visible impacts of 2000 dot-com crash, 2008 financial crisis, and 2020 COVID pandemic."
chart_docs_str = "Interactive time series plot showing cumulative returns of S&P 500 from 1996-2024. Demonstrates long-run equity market performance including major market events."
dataframe_id = "crsp_sp500"
path_to_html_chart = "src/_output/chart1_sp500_cumulative.html"

[charts.sp500_volatility]
chart_name = "S&P 500 Rolling Volatility"
short_description_chart = "1-year rolling annualized volatility of S&P 500 returns. Highlights periods of market stress: 2008 financial crisis (>80% volatility) and 2020 COVID shock."
chart_docs_str = "Rolling 252-day annualized volatility of S&P 500 daily returns. Shows volatility spikes during crisis periods (2008, 2020) and generally elevated volatility in recent years."
dataframe_id = "crsp_sp500"
path_to_html_chart = "src/_output/chart1_sp500_volatility.html"

[charts.treasury_rates]
chart_name = "Treasury Rates Over Time"
short_description_chart = "Time series of 1-month T-bill, 2-year, and 10-year Treasury rates. Shows the decline in interest rates from 1990s levels (~6%) to near-zero during 2008 crisis and COVID, followed by rapid increases in 2022-2024."
chart_docs_str = "Three time series showing evolution of Treasury rates across different maturities. Demonstrates the decline from high rates in 1990s to near-zero in 2020, followed by rapid normalization in 2022-2024."
dataframe_id = "fred_treasury_rates"
path_to_html_chart = "src/_output/chart2_treasury_rates.html"

[charts.treasury_returns]
chart_name = "Monthly Treasury Bond Returns"
short_description_chart = "Monthly returns on 2-year and 10-year Treasury bonds. 10-year bonds show higher volatility due to longer duration. Extreme positive returns during 2008 crisis as rates fell sharply."
chart_docs_str = "Monthly total returns for 2-year and 10-year constant maturity Treasuries. Shows duration effect (10Y more volatile than 2Y) and large positive returns during rate declines (e.g., 2008, 2020)."
dataframe_id = "crsp_treasury_returns"
path_to_html_chart = "src/_output/chart3_treasury_returns.html"

[charts.options_count]
chart_name = "Number of SPX Options Available (Month-End)"
short_description_chart = "Growth in number of SPX options over time, from ~200 options/month in 1996 to over 9,000 in 2025. Reflects expansion of options market with more strike prices and expiration dates."
chart_docs_str = "Time series showing rapid growth in SPX options market over 30 years. Demonstrates market development with increasing number of available strikes and maturities, particularly accelerating after 2015."
dataframe_id = "optionmetrics_spx"
path_to_html_chart = "src/_output/chart4_options_count.html"

[charts.options_prices]
chart_name = "Distribution of SPX Option Prices"
short_description_chart = "Histogram of option mid-prices showing right-skewed distribution. Most options priced under $500, with a long tail of expensive deep-in-the-money options."
chart_docs_str = "Histogram of SPX option mid-prices across all month-end observations. Right-skewed distribution shows most options are relatively cheap (<$500), with a long tail of expensive deep-ITM or long-dated options."
dataframe_id = "optionmetrics_spx"
path_to_html_chart = "src/_output/chart4_options_prices.html"